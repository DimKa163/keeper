edition = "2023";

package go;

import "google/protobuf/go_features.proto";
option features.(pb.go).api_level = API_OPAQUE;

option go_package = "/pb";

message Data {
  string id = 1;
  string name = 2;
  enum DataType {
    LoginPass = 0;
    Text = 1;
    BankCard = 2;
    Other = 3;
  }
  DataType type  = 3;
  bool large = 4;
  bytes dek_nonce = 5;
  bytes dek = 6;
  bytes data_nonce = 7;
  bytes data = 8;
  bytes file_data_nonce = 9;
  int32 version = 10;
  bool deleted = 11;
}

enum RequestType{
  Default = 0;
  StartData = 1;
  FilePart = 2;
  EndData = 3;
  ErrData = 4;
}

message PushRequest {
  repeated Data data = 1;
}

message Push{
  Data data = 1;
  RequestType type = 2;
  bytes chunk = 3;
}

message PushResponse {
  bool success = 1;
}

message PollRequest {
  int32 since = 1;
}

message PollResponse {
  int32 server_version = 1;
  repeated Data data = 2;
}

message Poll {
  int32 server_version = 1;
  RequestType type = 2;
  Data data = 3;
  bytes chunk = 4;
}

service SyncData {
  rpc PushUnary(PushRequest) returns(PushResponse);
  rpc PushStream(stream Push) returns(PushResponse);
  rpc PollUnary(PollRequest) returns(PollResponse);
  rpc PollStream(PollRequest) returns(stream Poll);
}