edition = "2023";

package go;


import "google/protobuf/go_features.proto";
option features.(pb.go).api_level = API_OPAQUE;

option go_package = "/pb";

message Data {
  string id = 1;
  string name = 2;
  enum DataType {
    LoginPass = 0;
    Text = 1;
    BankCard = 2;
    Other = 3;
  }
  DataType type  = 3;
  bool large = 4;
  bytes dek_nonce = 5;
  bytes dek = 6;
  bytes data_nonce = 7;
  bytes data = 8;
  int32 version = 9;
}
enum OperationType {
  Insert = 0;
  Update = 1;
  Delete = 2;
}

message Operation {
  Data data = 1;
  OperationType type = 2;
}

message PushRequest {
  repeated Operation requests = 1;
}

message OperationResponse {
  Data data = 1;
}

message PushResponse {
  repeated OperationResponse data = 1;
}

message PollRequest {

}

service StoredData {
  rpc Push(PushRequest) returns(PushResponse);
  rpc Poll(PollRequest) returns(stream Data);
}